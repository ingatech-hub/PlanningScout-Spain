name: PlanningScout — Madrid Daily Scrape

on:
  schedule:
    #  2:00 UTC = 2:00 AM Madrid winter (CET = UTC+1)
    #             3:00 AM Madrid summer (CEST = UTC+2)
    #  Change to '0 2 * * 1-5' if you prefer 4AM year-round in summer.
    - cron: '0 3 * * 1-5'   # Mon–Fri — AUTOMATIC, no manual click needed
  workflow_dispatch:         # Keep this so you can still trigger manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # Must be > MAX_RUN_MINUTES + overhead
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # FIXED: was '3.14' which does not exist

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Madrid scraper
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          GMAIL_FROM:               ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO_DEMO_MADRID:     ${{ secrets.GMAIL_TO_DEMO_MADRID }}
          MAX_RUN_MINUTES:          "340"   # Engine exits cleanly 8min before GitHub kills it
        run: |
          # --weeks 1 = DAILY mode: scans last 2 working days only (~30-45 min)
          # --weeks 2 = WEEKLY mode: scans 2 weeks + keyword search (~1-2 hrs)
          # --weeks 4+ = FULL backfill: use --resume flag if job is interrupted
          python core/engine.py --client clients/demo_madrid.json --weeks 1
